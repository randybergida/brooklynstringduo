<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; line-height: 1.6; color: #333; padding: 2rem; }

        /* The container keeps everything centered and at a max width */
        .container {
            max-width: 600px; /* This keeps your photo and text from getting too wide */
            margin: 0 auto;
        }

        .hero img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px; /* Optional: gives it a nice, soft look */
            margin-bottom: 2rem;
        }

        .content { text-align: center; }
        h1 { margin-bottom: 1rem; }
        .bio { margin-bottom: 2rem; }

        .links { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            display: block;
            padding: 12px;
            background: #f4f4f4;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <!-- Use your square photo here -->
            <img src="images/hero-square.jpg" alt="Brooklyn String Duo">
        </header>

        <main class="content">
            <h1>Brooklyn String Duo</h1>
            <div class="bio">
                <p>Your bio goes here.</p>
            </div>

            <section class="links">
                <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
                <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions (iTunes)</a>
                <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers (New York Ceremony Music)</a>
            </section>
        </main>
    </div>
</body>
</html>
