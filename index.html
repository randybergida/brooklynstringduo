<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #fff;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }

        /* Title at the top-left */
        .brand-name {
            position: absolute;
            top: 60px;
            left: 60px;
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #ffffff;
            text-transform: lowercase;
            z-index: 2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        /* Bottom-left area containing both Bio and Links */
        .bottom-left-panel {
            position: absolute;
            bottom: 60px;
            left: 60px;
            max-width: 400px; /* Constrains the bio width */
            z-index: 2;
        }

        .bio {
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            border-bottom: 1px solid transparent;
            transition: border 0.3s;
        }
        .btn:hover { border-bottom: 1px solid #fff; }

        @media (max-width: 768px) {
            .brand-name { font-size: 2.5rem; top: 40px; left: 40px; }
            .bottom-left-panel { bottom: 40px; left: 40px; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
        
        <h1 class="brand-name">brooklyn string duo</h1>
        
        <div class="bottom-left-panel">
            <main class="bio">
                <p>We are a professional string duo based in New York, specializing in bespoke arrangements for weddings and private events. Bringing nylon string guitar and cello to your ceremony.</p>
            </main>
            
            <nav class="link-grid">
                <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
                <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions</a>
                <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
            </nav>
        </div>
    </header>
</body>
</html>
