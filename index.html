<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Hero: Full width, no fixed height to prevent awkward cropping */
        .hero {
            width: 100%;
            position: relative;
            margin-bottom: 60px;
        }

        .hero img {
            width: 100%;
            display: block;
            height: auto;
        }

        .brand-name {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #1a1a1a;
            text-transform: lowercase;
            letter-spacing: -1px;
        }

        .content-area {
            max-width: 600px; /* Tighter measure for better readability */
            margin: 0 auto 100px auto;
            padding: 0 20px;
        }

        .bio-text { 
            margin-bottom: 60px; 
            font-weight: 300;
            font-size: 1.2rem;
            color: #444;
        }

        .link-grid {
            display: grid;
            grid-template-columns: 1fr; /* Stacked on mobile */
            gap: 15px;
        }

        /* Responsive grid */
        @media (min-width: 600px) {
            .link-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .btn {
            display: block;
            padding: 18px 10px;
            text-align: center;
            border: 1px solid #1a1a1a;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }
        
        .btn:hover { 
            background: #1a1a1a; 
            color: #fff; 
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1 class="brand-name">brooklyn string duo</h1>
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
    </header>

    <main class="content-area">
        <div class="bio-text">
            <p>New York ceremony music defined by the intimate resonance of nylon string guitar and cello. Captured with a U47 and AEA R84, our recordings strip away the unnecessary, leaving only the composition.</p>
        </div>

        <section class="link-grid">
            <a href="URL_TO_ORIGINALS" class="btn">Originals</a>
            <a href="URL_TO_ITUNES" class="btn">Rotary Sessions</a>
            <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
        </section>
    </main>
</body>
</html>
