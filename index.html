<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Anchors the photo to the bottom to push 'wallpaper' to the top */
            object-position: center bottom; 
        }

        /* Title at the top-left */
        .brand-name {
            position: absolute;
            top: 60px; 
            left: 50px; 
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3.5rem;
            color: #ffffff;
            text-transform: lowercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Links stacked on the right */
        .links {
            position: absolute;
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .btn {
            display: block;
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-align: center;
            transition: all 0.3s;
        }
        .btn:hover { background: #ffffff; color: #333; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .brand-name { left: 0; right: 0; text-align: center; font-size: 2rem; }
            .links { right: 0; left: 0; top: auto; bottom: 50px; transform: none; align-items: center; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
        
        <h1 class="brand-name">brooklyn string duo</h1>
        
        <section class="links">
            <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
            <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions</a>
            <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
        </section>
    </header>
</body>
</html>
