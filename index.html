<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center 20%; 
        }

        .brand-name {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #fff;
            text-transform: lowercase;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            z-index: 2;
        }

        .bottom-left-panel {
            position: absolute;
            bottom: 40px;
            left: 40px;
            max-width: 450px;
            background: rgba(0,0,0,0.4); 
            padding: 25px;
            border-radius: 4px;
            z-index: 2;
        }

        .bio {
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            width: fit-content;
        }
        .btn:hover { border-bottom: 1px solid #fff; }

        @media (max-width: 768px) {
            .brand-name { font-size: 2rem; }
            .bottom-left-panel { left: 20px; right: 20px; bottom: 20px; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
        
        <h1 class="brand-name">brooklyn string duo</h1>
        
        <div class="bottom-left-panel">
            <main class="bio">
                <p>We are a professional string duo based in New York, specializing in arrangements for weddings and private events. Bringing nylon string guitar and cello to your ceremony.</p>
            </main>
            
            <nav class="link-grid">
                <a href="URL_TO_ORIGINALS" class="btn">Original Custom Songs</a>
                <a href="URL_TO_COMMISSIONS" class="btn">Soundtrack Commissions</a>
                <a href="URL_TO_COVERS" class="btn">Covers</a>
            </nav>
        </div>
    </header>
</body>
</html>
