<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
            color: #1a1a1a; 
            padding: 4rem 2rem; 
        }

        .container { max-width: 800px; margin: 0 auto; }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-transform: lowercase;
            letter-spacing: -0.5px;
        }

        .hero img {
            width: 100%;
            height: auto;
            margin-bottom: 3rem;
        }

        .bio { 
            margin-bottom: 3rem; 
            font-size: 1.1rem; 
            font-weight: 300; 
            line-height: 1.8; 
            color: #444; 
        }

        /* Modern 3-column layout without hard boxes */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px; /* More space between columns */
            margin-top: 2rem;
            border-top: 1px solid #eee; /* Subtle separator instead of boxes */
            padding-top: 2rem;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.5; }

        @media (max-width: 600px) {
            .link-grid { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="brand-name">brooklyn string duo</h1>
        
        <header class="hero">
            <img src="images/hero.jpg" alt="Brooklyn String Duo">
        </header>

        <main class="bio">
            <p>Your bio goes here. Modern web design relies on generous margins and lighter-weight fonts to create that "editorial" feel, moving far away from the rigid, boxed-in look of the past.</p>
        </main>

        <section class="link-grid">
            <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
            <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions</a>
            <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
        </section>
    </div>
</body>
</html>
