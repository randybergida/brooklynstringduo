<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Set body to white to eliminate high-contrast black bars */
        body { 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
            color: #1a1a1a; 
        }

        .hero {
            position: relative;
            width: 100vw;
            height: 90vh; /* Slightly less than full screen to allow breathing room */
            background: #ffffff;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center top; 
        }

        .brand-name {
            position: absolute;
            top: 20px; /* Moved much higher */
            left: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #1a1a1a; /* Black text on white background */
            text-transform: lowercase;
            z-index: 2;
        }

        .content-area {
            max-width: 700px;
            margin: 0 auto 60px auto;
            padding: 40px 20px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .bio-text { margin-bottom: 40px; color: #333; }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            border-top: 1px solid #eee;
            padding-top: 40px;
        }

        .btn {
            display: block;
            padding: 15px;
            text-align: center;
            border: 1px solid #1a1a1a;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn:hover { background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>
    <header class="hero">
        <h1 class="brand-name">brooklyn string duo</h1>
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
    </header>

    <main class="content-area">
        <div class="bio-text">
            <p>Your long-form bio goes here. Because we moved to a white background, the transition from the image to the text feels seamless, like a high-end print editorial rather than a harsh web layout.</p>
        </div>

        <section class="link-grid">
            <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
            <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions</a>
            <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
        </section>
    </main>
</body>
</html>
