<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; line-height: 1.6; color: #333; padding: 2rem; }

        .container {
            max-width: 900px; /* Wider container to fit two columns */
            margin: 0 auto;
            display: flex; /* This turns on the column system */
            gap: 2rem;
            align-items: flex-start; /* Keeps things aligned to the top */
        }

       /* Hero Column (Left) - Takes up 60% of the space */
        .hero { flex: 1.5; } 
        
        /* Content Column (Right) - Takes up 40% of the space */
        .content { flex: 1; text-align: left; padding-left: 2rem; }
        
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-transform: lowercase;
        }

        .bio { margin-bottom: 2rem; }

        .links { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            display: block;
            padding: 12px;
            background: #f4f4f4;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #e0e0e0; }

        /* Mobile Responsive: Stack them if screen is narrow */
        @media (max-width: 768px) {
            .container { flex-direction: column; text-align: center; }
            .content { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <img src="images/hero.jpg" alt="Brooklyn String Duo">
        </header>

        <main class="content">
            <h1 class="brand-name">brooklyn string duo</h1>
            <div class="bio">
                <p>Your bio goes here.</p>
            </div>

            <section class="links">
                <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
                <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions (iTunes)</a>
                <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers (New York Ceremony Music)</a>
            </section>
        </main>
    </div>
</body>
</html>
