<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* The Hero fills the entire screen perfectly */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* This keeps the image centered, removing the 'crop' frustration */
            object-position: center center; 
        }

        /* Subtle gradient to make text pop against the cinematic photo */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        /* Title at the top-left */
        .brand-name {
            position: absolute;
            top: 60px;
            left: 60px;
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #ffffff;
            text-transform: lowercase;
            z-index: 2;
        }

        /* Links anchored to the bottom-left */
        .link-grid {
            position: absolute;
            bottom: 60px;
            left: 60px;
            display: flex;
            gap: 40px;
            z-index: 2;
        }

        .btn {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
            transition: border 0.3s;
        }
        .btn:hover { border-bottom: 1px solid #fff; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .brand-name { font-size: 2.5rem; top: 40px; left: 40px; }
            .link-grid { bottom: 40px; left: 40px; flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="overlay"></div>
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
        
        <h1 class="brand-name">brooklyn string duo</h1>
        
        <nav class="link-grid">
            <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
            <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions</a>
            <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
        </nav>
    </header>
</body>
</html>
