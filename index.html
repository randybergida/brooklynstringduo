<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; line-height: 1.6; color: #333; padding: 2rem; }

        .container {
            max-width: 700px; /* Constrains the entire site width */
            margin: 0 auto;
            text-align: center;
        }

        .hero img {
            width: 100%;
            max-width: 700px; /* Limits photo width */
            height: auto;
            display: block;
            margin: 0 auto 2rem auto; /* Centers the image */
            border-radius: 8px;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 1.5rem;
            text-transform: lowercase;
            white-space: nowrap; /* Forces text to stay on one line */
        }

        .bio { margin-bottom: 2rem; }

        .links { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; }
        .btn {
            display: block;
            padding: 12px;
            background: #f4f4f4;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <img src="images/hero.jpg" alt="Brooklyn String Duo">
        </header>

        <main class="content">
            <h1 class="brand-name">brooklyn string duo</h1>
            <div class="bio">
                <p>Your bio goes here.</p>
            </div>

            <section class="links">
                <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
                <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions (iTunes)</a>
                <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers (New York Ceremony Music)</a>
            </section>
        </main>
    </div>
</body>
</html>
