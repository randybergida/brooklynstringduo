<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn String Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #000; } /* Black background to frame the full photo */

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .hero img {
            width: 100%;
            height: 100%;
            /* 'contain' ensures the WHOLE photo is always seen without any cropping */
            object-fit: contain; 
            object-position: center center;
        }

        /* Title at the top-left */
        .brand-name {
            position: absolute;
            top: 40px; 
            left: 40px; 
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3rem;
            color: #ffffff;
            text-transform: lowercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Links on the right */
        .links {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .btn {
            display: block;
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-align: center;
            transition: all 0.3s;
        }
        .btn:hover { background: #ffffff; color: #000; }
    </style>
</head>
<body>
    <header class="hero">
        <img src="images/hero.jpg" alt="Brooklyn String Duo">
        
        <h1 class="brand-name">brooklyn string duo</h1>
        
        <section class="links">
            <a href="URL_TO_ORIGINALS" class="btn">Listen to Originals</a>
            <a href="URL_TO_ITUNES" class="btn">The Rotary Sessions</a>
            <a href="URL_TO_NYCM_SPOTIFY" class="btn">Covers</a>
        </section>
    </header>
</body>
</html>
